spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:url_shortener}?useSSL=false&serverTimezone=UTC&characterEncoding=UTF-8&allowPublicKeyRetrieval=true
spring.datasource.username=${DB_USER:urlshortener}
spring.datasource.password=${DB_PASSWORD:Url1357!}
